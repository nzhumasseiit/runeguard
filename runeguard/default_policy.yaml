# RuneGuard policy schema v0.1. Keep version: 1 stable.
version: 1

policy:
  backend: yaml

sandbox:
  backend: docker
  fs_enforcement: none
  network: deny
  readonly_rootfs: true
  readonly_workspace: true
  writable_paths:
    - "tmp/"
    - ".cache/"

files:
  deny:
    - ".env"
    - ".env.*"
    - ".git/**"
    - "**/secrets/**"
    - "~/.ssh/**"
    - "~/.aws/**"
    - "~/.config/gcloud/**"
  allow:
    - "src/**"
    - "tests/**"
    - "tmp/**"
    - ".cache/**"
    - "README.md"

network:
  default: deny
  allow_domains:
    - "api.openai.com"
    - "github.com"

shell:
  deny_patterns:
    - "rm -rf"
    - "curl * | sh"
    - "nc "
    - "scp "
    - "ssh "
